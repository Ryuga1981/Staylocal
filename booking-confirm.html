<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed — StayLocal</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--teal:#0D5C63;--coral:#E8472A;--cream:#FAFAF5;--ink:#12110F;--ink-lt:#8A8784;--white:#fff;--border:rgba(18,17,15,0.10);--green:#22C55E;}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:68px;background:rgba(250,250,245,0.95);border-bottom:1px solid var(--border)}
  .nav-logo{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--teal);text-decoration:none}
  .nav-logo span{color:var(--coral)}
  .wrap{max-width:640px;margin:0 auto;padding:60px 20px;flex:1;text-align:center}
  .confirm-icon{width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,0.12);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px}
  h1{font-family:'Fraunces',serif;font-size:32px;font-weight:400;margin-bottom:8px}
  .subtitle{font-size:15px;color:var(--ink-lt);margin-bottom:36px;line-height:1.6}
  .card{background:var(--white);border-radius:22px;padding:28px;box-shadow:0 2px 16px rgba(18,17,15,0.08);text-align:left;margin-bottom:20px}
  .card h3{font-family:'Fraunces',serif;font-size:18px;font-weight:500;margin-bottom:16px}
  .detail-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px}
  .detail-label{color:var(--ink-lt)}
  .detail-val{font-weight:500;text-align:right}
  .listing-mini{display:flex;gap:14px;padding:16px;background:var(--cream);border-radius:12px;margin-bottom:20px}
  .listing-mini img{width:72px;height:56px;border-radius:8px;object-fit:cover}
  .listing-mini-title{font-family:'Fraunces',serif;font-size:15px;font-weight:500;margin-bottom:3px}
  .listing-mini-loc{font-size:12px;color:var(--ink-lt)}
  .cashback-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(13,92,99,0.08);color:var(--teal);padding:10px 16px;border-radius:100px;font-size:13px;font-weight:600;margin-bottom:20px}
  .status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600}
  .status-paid{background:rgba(34,197,94,0.12);color:#15803d}
  .status-pending{background:rgba(245,158,11,0.12);color:#92400e}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:100px;font-size:14px;font-weight:600;border:none;cursor:pointer;text-decoration:none}
  .btn-primary{background:var(--teal);color:#fff}
  .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink)}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}
  .order-id{font-size:12px;color:var(--ink-lt);margin-top:24px}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Stay<span>Local</span></a>
  <div id="guestNav"></div>
</nav>

<div class="wrap" id="content">
  <div style="padding:60px;color:var(--ink-lt)">Loading…</div>
</div>

<script src="guest-auth.js"></script>
<script>
const NETLIFY_SITE = 'https://staylocalzahra.netlify.app';

function photoUrl(path) {
  if (!path) return 'https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf?w=200&q=70';
  if (path.startsWith('/images/')) return NETLIFY_SITE + path;
  return path;
}

function render() {
  renderGuestNav();
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('order');
  if (!orderId) {
    document.getElementById('content').innerHTML = '<p>Order not found. <a href="index.html" style="color:var(--teal)">Go home</a></p>';
    return;
  }

  const bookings = getBookings();
  const booking = bookings.find(b => b.id === orderId);
  if (!booking) {
    document.getElementById('content').innerHTML = '<p>Booking not found. <a href="index.html" style="color:var(--teal)">Go home</a></p>';
    return;
  }

  const isPaid = booking.paymentStatus === 'paid';
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="confirm-icon">${isPaid ? '✅' : '⏳'}</div>
    <h1>${isPaid ? 'You\'re booked!' : 'Payment pending'}</h1>
    <p class="subtitle">${isPaid
      ? 'Your reservation is confirmed. The host will contact you with check-in details.'
      : 'Complete your payment to confirm the booking. Instructions have been sent to your email.'}</p>

    ${booking.cashbackAmt > 0 ? `<div class="cashback-badge">💰 You'll earn ${formatIDR(booking.cashbackAmt)} cashback after your stay</div>` : ''}

    <div class="card">
      <div class="listing-mini">
        <img src="${photoUrl(booking.listingPhoto)}" onerror="this.src='https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf?w=200&q=70'">
        <div>
          <div class="listing-mini-title">${booking.listingTitle}</div>
          <div class="listing-mini-loc">${booking.listingLocation || ''}</div>
        </div>
      </div>
      <div class="detail-row"><span class="detail-label">Check-in</span><span class="detail-val">${formatDate(booking.checkin)}</span></div>
      <div class="detail-row"><span class="detail-label">Check-out</span><span class="detail-val">${formatDate(booking.checkout)}</span></div>
      <div class="detail-row"><span class="detail-label">Nights</span><span class="detail-val">${booking.nights}</span></div>
      <div class="detail-row"><span class="detail-label">Guests</span><span class="detail-val">${booking.guests}</span></div>
      <div class="detail-row"><span class="detail-label">Total paid</span><span class="detail-val" style="font-size:16px;font-weight:700;color:var(--teal)">${formatIDR(booking.totalPrice)}</span></div>
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-val"><span class="status-badge ${isPaid?'status-paid':'status-pending'}">${isPaid?'✓ Paid':'⏳ Pending'}</span></span></div>
      <div class="detail-row"><span class="detail-label">Payment method</span><span class="detail-val">${booking.paymentMethod?.toUpperCase().replace('_',' ')}</span></div>
    </div>

    <div class="card">
      <h3>Guest details</h3>
      <div class="detail-row"><span class="detail-label">Name</span><span class="detail-val">${booking.guestName}</span></div>
      <div class="detail-row"><span class="detail-label">Email</span><span class="detail-val">${booking.guestEmail}</span></div>
      <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-val">${booking.guestPhone}</span></div>
    </div>

    <div class="actions">
      <a href="trips.html" class="btn btn-primary">🧳 View my trips</a>
      <a href="index.html" class="btn btn-outline">← Back to search</a>
    </div>
    <div class="order-id">Order ID: ${orderId}</div>
  `;
}
render();
</script>
</body>
</html>
